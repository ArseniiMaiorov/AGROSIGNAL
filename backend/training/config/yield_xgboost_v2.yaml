model_name: yield_baseline_v2
model_version: agronomy_xgb_v2
dataset_version: yield_corpus_v2
target_column: yield_kg_ha
test_size: 0.2
random_state: 42
backend_preference:
  - xgboost
  - histgradientboosting
max_depth: 6
learning_rate: 0.05
n_estimators: 400
subsample: 0.9
colsample_bytree: 0.9
min_samples_leaf: 16
prediction_interval_alpha: 0.1
notes:
  - Falls back to HistGradientBoostingRegressor when xgboost is unavailable.
  - Intended for CPU-only local training.
