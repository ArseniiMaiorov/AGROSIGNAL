upstream backend_api {
    server backend-api:8000;
    keepalive 16;
}

upstream frontend_app {
    server frontend:5173;
    keepalive 4;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;
    proxy_read_timeout 180s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # Backend API + auxiliary endpoints
    location ~ ^/(api|health|docs|redoc|openapi\.json) {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prometheus metrics — ограничен внутренними сетями Docker
    location /metrics {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
    }

    # Frontend SPA (Vue 3 + Vite, порт 5173)
    # Upgrade-заголовки необходимы для Vite HMR WebSocket
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
